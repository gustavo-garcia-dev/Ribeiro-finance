<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/css/style.css">
    <title>Metas</title>
</head>

<body>
    <nav id="sidebar">
        <div id="sidebar_content">
            <div id="user">
                <img src="src/img/logo-site (3).png" id="user_avatar" alt="Avatar">

                <p id="user_infos">
                    <span class="item-description">
                        <span class="ribeiro">RIBEIRO FINANCE</span>
                    </span>
                    <span class="item-description">
                        Administrador
                    </span>
                </p>
            </div>

            <ul id="side_side_items">
                <li class="side-item">
                    <a href="index.html">
                        <i class="fa-solid fa-chart-simple"></i>
                        <span class="item-description">
                            Dashboard
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="add-gasto.html">
                        <i class="fa-solid fa-circle-plus"></i>
                        <span class="item-description">
                            Adicionar gastos
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="analise.html">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                        <span class="item-description">
                            Análises
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="metas.html">
                        <i class="fa-solid fa-bullseye"></i>
                        <span class="item-description">
                            Metas
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="configuracao.html">
                        <i class="fa-solid fa-gear"></i>
                        <span class="item-description">
                            Configurações
                        </span>
                    </a>
                </li>
            </ul>

            <button id="open_btn">
                <i id="open_btn_icon" class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div id="logout">
            <button id="logout_btn">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="item-description">
                    Logout
                </span>
            </button>
        </div>
    </nav>

    <main>
        <h1>Minhas metas</h1>

        <section class="form-meta">

            <h2>Criar Nova Meta</h2>

            <form id="formMeta">
                <div class="campo">
                    <label for="nomeMeta">Nome da Meta</label>
                    <input id="nomeMeta" type="text" placeholder="Ex: Viagem para Europa, Carro Novo" />
                </div>

                <div class="campo">
                    <label for="valorMeta">Valor da Meta</label>
                    <input id="valorMeta" type="number" inputmode="decimal" step="0.01" placeholder="R$ 0,00" />
                </div>

                <div class="campo">
                    <label>Prazo</label>

                    <div class="botoes-prazo">
                        <button type="button" class="prazo ativo">1 ano</button>
                        <button type="button" class="prazo">2 anos</button>
                        <button type="button" class="prazo">3 anos</button>
                        <button type="button" class="prazo">5 anos</button>
                    </div>

                    <input id="prazoValue" type="number" value="1" />
                </div>

                <div class="botoes-meta">
                    <button id="salvarMetaBtn" class="btn-criar" type="button">
                        <i class="fa-solid fa-plus"></i>
                        Adicionar meta
                    </button>



                </div>
            </form>
        </section>

        <section id="metasPreview" style="display:none;" class="form-meta" aria-live="polite">
            <h2>Como vai ser a sua meta</h2>
            <div id="metasList"></div>
        </section>
    </main>

    <script src="src/js/script.js"></script>
    <script src="src/js/marca.js"></script>
    <script src="src/js/metas.js"></script>
    <script src="src/js/appTheme.js"></script>
</body>

</html>
