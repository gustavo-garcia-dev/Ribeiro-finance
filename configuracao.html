<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/darkMode.css">
    <title>Configuração</title>
</head>

<body>
    <nav id="sidebar">
        <div id="sidebar_content">
            <div id="user">
                <img src="src/img/logo-site (3).png" id="user_avatar" alt="Avatar">

                <p id="user_infos">
                    <span class="item-description">
                        <span class="ribeiro">RIBEIRO FINANCE</span>
                    </span>
                    <span class="item-description">
                        Administrador
                    </span>
                </p>
            </div>

            <ul id="side_side_items">
                <li class="side-item">
                    <a href="index.html">
                        <i class="fa-solid fa-chart-simple"></i>
                        <span class="item-description">
                            Dashboard
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="add-gasto.html">
                        <i class="fa-solid fa-circle-plus"></i>
                        <span class="item-description">
                            Adicionar gastos
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="analise.html">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                        <span class="item-description">
                            Análises
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="metas.html">
                        <i class="fa-solid fa-bullseye"></i>
                        <span class="item-description">
                            Metas
                        </span>
                    </a>
                </li>


                <li class="side-item">
                    <a href="configuracao.html">
                        <i class="fa-solid fa-gear"></i>
                        <span class="item-description">
                            Configurações
                        </span>
                    </a>
                </li>
            </ul>

            <button id="open_btn">
                <i id="open_btn_icon" class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div id="logout">
            <button id="logout_btn">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="item-description">
                    Logout
                </span>
            </button>
        </div>
    </nav>

   
    <main class="config-container">

        <main>
            <h1>Configurações</h1>
        </main>

        <section class="config-card">

            <h2>Preferências</h2>

            <article class="config-item">
                <div>
                    <h3>Notificações</h3>
                    <p>Receber alertas de gastos</p>
                </div>

                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </article>

           
        </section>

        <section class="config-card">

            <h2>Limite Mensal</h2>

            <input type="number" placeholder="R$ 3000.00" class="input-limite">

        </section>

    </main>

    <script src="src/js/script.js"></script>
    <script src="src/js/marca.js"></script>
    <script src="src/js/darkMode.js"></script>
</body>

</html>
